# NPwned — stack Docker (MongoDB 8 + API + Nginx/Angular).
#
# Persistencia: volumen nombrado `npwned_mongo_data` → /data/db.
#
# Redes (importante para puertos al host):
# - `db` es **internal**: solo mongo + api; sin salida a Internet desde esa red.
# - `app` es bridge normal: api + web. El servicio **web** NO debe unirse a `db`:
#   si un contenedor está en una red `internal: true`, Docker puede **no publicar**
#   puertos al host (comportamiento conocido; ver moby/moby#36174). Por eso Nginx
#   va solo en `app`, donde sí funciona `ports:`.
#
# Requisito: `.env` en la raíz. Documentación: docs/DOCKER.md

name: npwned

services:
  mongo:
    image: mongo:8.0
    restart: unless-stopped
    stop_grace_period: 60s
    volumes:
      - mongo_data:/data/db
    networks:
      - db
    environment:
      MONGO_INITDB_DATABASE: npwned
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    ulimits:
      nofile:
        soft: 64000
        hard: 64000
    pids_limit: 2000
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: api
    pull_policy: build
    image: npwned-api:local
    restart: unless-stopped
    stop_grace_period: 20s
    init: true
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: npwned
      PORT: "3000"
      TRUST_PROXY: "true"
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en la raíz .env (ver .env.example y docs/DOCKER.md).}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Define ADMIN_PASSWORD en la raíz .env.}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - db
      - app
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/public/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: web
    pull_policy: build
    image: npwned-web:local
    restart: unless-stopped
    stop_grace_period: 15s
    init: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    networks:
      - app
    ports:
      - "${NPWNED_HTTP_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "5"

volumes:
  mongo_data:
    name: npwned_mongo_data
    driver: local

networks:
  db:
    driver: bridge
    internal: true
  app:
    driver: bridge
